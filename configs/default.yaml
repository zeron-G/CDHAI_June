analysis:
  max_narrative_cycles: 5
  output_dir: runs
  timezone: America/New_York
  min_numeric_non_null: 5
  plot: true
  cgm:
    low_mgdl: 70
    very_low_mgdl: 54
    target_low_mgdl: 70
    target_high_mgdl: 180
    very_high_mgdl: 250
  hypothesis:
    max_per_cycle: 3
    alpha: 0.05
  task_cycle:
    enabled: true
    max_rounds: 3
    min_completed_tasks: 5
    require_neural_network: true
    neural_network_epochs: 250
    neural_network_hidden_units: 4
  hapf:
    enabled: true
    require_for_gate: false
    cohort_data_path: ${CDHAI_HAPF_CGM_PATH:}
    model_config_path: ${CDHAI_HAPF_CONFIG_PATH:external/cdhai-hapf/configs/sample_cgm.yaml}
    heldout_subject: ${CDHAI_HAPF_HELDOUT_SUBJECT:}
    device: ${CDHAI_HAPF_DEVICE:}
    reuse_across_cycles: true
    allow_auto_holdout: false

llm:
  provider: ${CDHAI_LLM_PROVIDER:mock}
  model: ${CDHAI_LLM_MODEL:gpt-4o-mini}
  temperature: 0.2
  max_output_tokens: 1800
  codex_auth_path: ${CDHAI_CODEX_AUTH_PATH:}
  openai_base_url: ${CDHAI_OPENAI_BASE_URL:https://api.openai.com/v1}
  openai_api_key: ${CDHAI_OPENAI_API_KEY:}

external:
  haipipe_toolkit_path: ${CDHAI_HAIPIPE_TOOLKIT_PATH:external/haipipe-toolkit}
  haipipe_toolkit_url: ${CDHAI_HAIPIPE_TOOLKIT_URL:https://github.com/JHU-CDHAI/WellDoc-SPACE.git}
  welldoc_space_path: ${CDHAI_WELLDOC_SPACE_PATH:external/haipipe-toolkit}
  tools_path: ${CDHAI_TOOLS_PATH:external/tools}
  tools_url: ${CDHAI_TOOLS_URL:https://github.com/jluo41/Tools.git}
  codex_oauth_package_path: ${CDHAI_CODEX_OAUTH_PACKAGE_PATH:external/codex-oauth}
  codex_oauth_url: ${CDHAI_CODEX_OAUTH_URL:https://github.com/zeron-G/codex_oauth.git}
  academic_research_skills_path: ${CDHAI_ACADEMIC_RESEARCH_SKILLS_PATH:external/academic-research-skills}
  academic_research_skills_url: ${CDHAI_ACADEMIC_RESEARCH_SKILLS_URL:https://github.com/Imbad0202/academic-research-skills.git}
  hapf_path: ${CDHAI_HAPF_PATH:external/cdhai-hapf}
  hapf_url: ${CDHAI_HAPF_URL:https://github.com/zeron-G/CDHAI-HAPF.git}

database:
  ssh_host: ${CDHAI_DB_SSH_HOST:10.175.198.65}
  ssh_user: ${CDHAI_DB_SSH_USER:rgao28}
  ssh_port: ${CDHAI_DB_SSH_PORT:22}
  ssh_key_path: ${CDHAI_DB_SSH_KEY_PATH:}
  tunnel_local_port: ${CDHAI_DB_TUNNEL_LOCAL_PORT:15432}
  remote_host: ${CDHAI_DB_REMOTE_HOST:127.0.0.1}
  remote_port: ${CDHAI_DB_REMOTE_PORT:5432}
  db_name: ${CDHAI_DB_NAME:}
  db_user: ${CDHAI_DB_USER:}
  db_password: ${CDHAI_DB_PASSWORD:}
